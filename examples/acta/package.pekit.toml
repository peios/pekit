format = "peipkg"

[package]
name         = "acta"
version      = "{{version}}-1"   # -1 is the Peios package revision, not upstream
architecture = "x86_64"
description  = "Acta - project management tool for Peios (Go, htmx, Postgres)"
license      = "MIT"

[files]
":acta-server" = "usr/bin/acta-server"
":acta"        = "usr/bin/acta"
