# Kitchen-sink package.pekit.toml — a pretend package exercising every
# field of the format (mirroring peipkg/pack.Manifest / PSD-009 §3.3).
# Everything here parses and packs; a test keeps this file parse-clean.

format = "peipkg"

# Build targets to run before packaging, for literal-path sources whose
# producer can't be derived. Additive with the targets derived from
# stage references (which always build) — never an override.
builds = ["main"]

[package]
name         = "jellyfind"           # optional for tar (defaults to dir name); peipkg requires it
version      = "2.4.1"               # OPEN QUESTION: explicit here vs derived from git tag
architecture = "x86_64"
description  = "Media indexing daemon for the Tuesday-afternoon demo"
license      = "MIT"
homepage     = "https://github.com/peios/jellyfind"

# Values from the PSD-009 §4.3.4 enumerated set; order is semantic
# (emitted as given, unlike the name-keyed arrays which sort). Lives in
# [package] — a root-level key after any [section] would silently belong
# to that section (TOML), so root-level manifest keys are a trap.
sideEffects = ["registers-service", "creates-state-dirs"]

# Hard dependencies. Value = version constraint, "*" = any version.
# Arch-qualified deps use the inline-table form.
[dependencies]
loregd  = ">= 0.3.0"
eventd  = "*"
libkacs = { constraint = ">= 1.2", arch = "x86_64" }

[optionalDependencies]
jellyfind-webui = "*"

[conflicts]
jellyscan = "< 1.0"

# Virtual capabilities this package satisfies.
[provides]
media-indexer = "1.0"

# Packages this one supersedes on upgrade.
[replaces]
old-jellyfind = "< 2.0"

# Per-path security-descriptor overrides (§3.3.5), in SDDL (compiled
# to binary SDs by peipkg/pack via libp). Absolute SID aliases only —
# no domain context at pack time. Note SDDL has no whitespace between
# the O:/G:/D:/S: components.
[sdOverrides]
"usr/bin/jellyfind-admin" = "O:SYD:(A;;FX;;;BA)"
"var/lib/jellyfind"       = "O:SYD:(A;OICI;FA;;;SY)"

[files]
# Stage references — the standard. ":path" is sugar for "main:path";
# "target:path" names another build target's stage.
":jellyfind"        = "usr/bin/jellyfind"
"cli:jellyfindctl"  = "usr/bin/jellyfindctl"

# Literal project-relative path, for build systems (cargo) that cannot
# redirect output into the stage.
"target/x86_64-unknown-linux-musl/release/jellyfind-scan" = "usr/lib/jellyfind/scan"

# Non-binary payload straight from the source tree.
"configs/jellyfind.default.toml" = "usr/share/jellyfind/default.toml"

# A directory source becomes an explicit empty-directory entry
# (peipkg/pack supports this; the .keep sentinel workaround dies here).
"payload/empty-state-dir" = "var/lib/jellyfind"

# NOT in this file, by design:
#  - build provenance (§3.3.4): computed at pack time — proposal:
#    timestamp = HEAD commit time, sourceRef = commit hash,
#    farmId = "local" off-farm (farm overrides all three)
#  - signing: SignKey is farm infrastructure, never project config
#  - schema_version / size_installed: computed by peipkg/pack
